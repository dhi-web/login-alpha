<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Courses</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #e0995b;
    --accent-hover: #cf8a4e;
    --error: #ef5b5b;
    --success: #4fbf7f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
  }

  nav {
    display: flex;
    gap: 8px;
  }

  nav a {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
  }

  nav a.active {
    color: var(--text);
    border-color: var(--accent);
  }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 700px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  #loading {
    max-width: 700px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 6px;
  }

  p.subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 24px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin: 16px 0 6px;
  }

  label:first-of-type { margin-top: 0; }

  input, textarea {
    width: 100%;
    padding: 10px 12px;
    background: #0f1218;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
  }

  textarea { min-height: 80px; resize: vertical; }

  input:focus, textarea:focus { border-color: var(--accent); }

  .hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
  }

  button.save {
    margin-top: 20px;
    padding: 11px 22px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  button.save:hover { background: var(--accent-hover); }
  button.save:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 14px;
    font-size: 0.85rem;
    min-height: 1.2em;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--success); }

  .course-list {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .course-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
  }

  .course-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .course-name {
    font-weight: 600;
    font-size: 1.05rem;
  }

  .course-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
    line-height: 1.6;
  }

  .course-info {
    font-size: 0.9rem;
    margin-top: 8px;
    line-height: 1.5;
    color: var(--text);
  }

  .tickets-pill {
    flex-shrink: 0;
    background: rgba(224, 153, 91, 0.12);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .registrants {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .registrants-title {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .registrant-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 0.88rem;
  }

  .registrant-email {
    color: var(--text);
  }

  .registrant-tickets {
    color: var(--muted);
    margin-left: 8px;
  }

  .cancel-btn {
    padding: 4px 10px;
    font-size: 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--error);
    background: transparent;
    color: var(--error);
    cursor: pointer;
  }

  .cancel-btn:hover { background: rgba(239, 91, 91, 0.1); }

  .delete-course-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    font-size: 0.78rem;
    border-radius: 6px;
    border: 1px solid var(--error);
    background: transparent;
    color: var(--error);
    cursor: pointer;
    white-space: nowrap;
  }

  .delete-course-btn:hover { background: rgba(239, 91, 91, 0.1); }

  .edit-course-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    font-size: 0.78rem;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    white-space: nowrap;
  }

  .edit-course-btn:hover { background: rgba(224, 153, 91, 0.1); }

  .header-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .pending-badge {
    display: inline-block;
    background: rgba(224, 153, 91, 0.15);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-left: 8px;
  }

  .cancel-request-actions {
    display: flex;
    gap: 6px;
    margin-left: 8px;
  }

  .approve-btn, .reject-btn {
    padding: 3px 9px;
    font-size: 0.72rem;
    border-radius: 6px;
    cursor: pointer;
  }

  .approve-btn {
    border: 1px solid #4fbf7f;
    background: transparent;
    color: #4fbf7f;
  }

  .approve-btn:hover { background: rgba(79, 191, 127, 0.1); }

  .reject-btn {
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--muted);
  }

  .reject-btn:hover { border-color: var(--text); color: var(--text); }

  .no-registrants {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="loading">Checking access…</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">Your App <span class="badge">Admin</span></div>
    <nav>
      <a href="admin.html">Announcement</a>
      <a href="admin-courses.html" class="active">Courses</a>
    </nav>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <main>
    <div class="card">
      <h1>Create a course</h1>
      <p class="subtitle">This will appear immediately for all registered users.</p>

      <form id="course-form">
        <label for="c-name">Course name</label>
        <input type="text" id="c-name" required placeholder="e.g. Basic First Aid Workshop">

        <label for="c-info">Course info (optional)</label>
        <textarea id="c-info" placeholder="e.g. Includes certificate, lunch provided"></textarea>

        <label for="c-start-date">Start date</label>
        <input type="date" id="c-start-date" required>

        <label for="c-end-date">End date</label>
        <input type="date" id="c-end-date" required>
        <p class="hint">Choose the same date as start date for a single-day course.</p>

        <label for="c-location">Location</label>
        <input type="text" id="c-location" required placeholder="e.g. Dewan Serbaguna, Rawang">

        <label for="c-tickets">Total tickets (1-40)</label>
        <input type="number" id="c-tickets" min="1" max="40" value="20" required>

        <button type="submit" class="save" id="save-btn">Create course</button>
        <a href="#" id="cancel-edit-link" class="hidden" style="margin-left: 12px; font-size: 0.85rem; color: var(--muted);">Cancel edit</a>
        <p class="message" id="message"></p>
      </form>
    </div>

    <div id="course-list" class="course-list"></div>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const form = document.getElementById("course-form");
  const nameInput = document.getElementById("c-name");
  const infoInput = document.getElementById("c-info");
  const startDateInput = document.getElementById("c-start-date");
  const endDateInput = document.getElementById("c-end-date");
  const locationInput = document.getElementById("c-location");
  const ticketsInput = document.getElementById("c-tickets");
  const saveBtn = document.getElementById("save-btn");
  const cancelEditLink = document.getElementById("cancel-edit-link");
  const formTitle = document.querySelector(".card h1");

  let editingCourseId = null; // null = creating new, otherwise editing this course's id
  let coursesData = []; // keeps last loaded courses so Edit can look up full row data
  const messageEl = document.getElementById("message");
  const courseListEl = document.getElementById("course-list");
  const logoutBtn = document.getElementById("logout-btn");

  function setMessage(text, type) {
    messageEl.textContent = text || "";
    messageEl.className = "message" + (type ? " " + type : "");
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  function formatDateRange(startStr, endStr) {
    if (startStr === endStr) return formatDate(startStr);
    return `${formatDate(startStr)} – ${formatDate(endStr)}`;
  }

  function formatDateTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleString(undefined, {
      year: "numeric", month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  // Guard: must be logged in AND have role = admin
  async function guardAndLoad() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "admin-login.html";
      return;
    }

    if (session.user.app_metadata?.role !== "admin") {
      await supabaseClient.auth.signOut();
      window.location.href = "admin-login.html";
      return;
    }

    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");

    loadCourses();
  }

  // Loads all courses (with computed tickets_remaining) plus, for each
  // course, the full list of registrants (visible to admin only).
  async function loadCourses() {
    const { data: courses, error } = await supabaseClient
      .from("course_availability")
      .select("*")
      .order("start_date", { ascending: true });

    if (error) {
      courseListEl.innerHTML = `<p class="no-registrants">Failed to load courses: ${escapeHtml(error.message)}</p>`;
      return;
    }

    coursesData = courses || [];

    if (!courses || courses.length === 0) {
      courseListEl.innerHTML = '<p class="no-registrants">No courses created yet.</p>';
      return;
    }

    // Fetch registrants for all courses in one query, then group by course_id
    const { data: regs } = await supabaseClient
      .from("registrations")
      .select("id, course_id, user_email, tickets_count, created_at")
      .order("created_at", { ascending: true });

    const regsByCourse = {};
    (regs || []).forEach(r => {
      if (!regsByCourse[r.course_id]) regsByCourse[r.course_id] = [];
      regsByCourse[r.course_id].push(r);
    });

    // Fetch pending cancellation requests, keyed by registration_id
    const { data: pendingRequests } = await supabaseClient
      .from("cancellation_requests")
      .select("id, registration_id")
      .eq("status", "pending");

    const pendingByRegId = {};
    (pendingRequests || []).forEach(req => {
      pendingByRegId[req.registration_id] = req.id;
    });

    courseListEl.innerHTML = courses.map(course => {
      const registrants = regsByCourse[course.id] || [];

      const registrantsHtml = registrants.length === 0
        ? '<p class="no-registrants">No registrations yet.</p>'
        : registrants.map(r => {
            const pendingReqId = pendingByRegId[r.id];
            return `
            <div class="registrant-row">
              <span>
                <span class="registrant-email">${escapeHtml(r.user_email)}</span>
                <span class="registrant-tickets">${r.tickets_count} ticket${r.tickets_count > 1 ? "s" : ""} — ${formatDateTime(r.created_at)}</span>
                ${pendingReqId ? `
                  <span class="pending-badge">Cancellation requested</span>
                  <span class="cancel-request-actions">
                    <button class="approve-btn" data-request-id="${pendingReqId}" data-reg-id="${r.id}">Approve</button>
                    <button class="reject-btn" data-request-id="${pendingReqId}">Reject</button>
                  </span>
                ` : ""}
              </span>
              <button class="cancel-btn" data-reg-id="${r.id}">Cancel</button>
            </div>
          `;
          }).join("");

      return `
        <div class="course-item">
          <div class="course-header">
            <div>
              <div class="course-name">${escapeHtml(course.name)}</div>
              <div class="course-meta">${formatDateRange(course.start_date, course.end_date)} &middot; ${escapeHtml(course.location)}</div>
              ${course.info ? `<div class="course-info">${escapeHtml(course.info)}</div>` : ""}
            </div>
            <div class="header-actions">
              <div class="tickets-pill">${course.tickets_remaining} / ${course.total_tickets} left</div>
              <div style="display: flex; gap: 6px;">
                <button class="edit-course-btn" data-course-id="${course.id}">Edit</button>
                <button class="delete-course-btn" data-course-id="${course.id}">Delete</button>
              </div>
            </div>
          </div>
          <div class="registrants">
            <div class="registrants-title">Registrants</div>
            ${registrantsHtml}
          </div>
        </div>
      `;
    }).join("");
  }

  function resetFormToCreateMode() {
    editingCourseId = null;
    form.reset();
    ticketsInput.value = 20;
    saveBtn.textContent = "Create course";
    formTitle.textContent = "Create a course";
    cancelEditLink.classList.add("hidden");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setMessage("");

    // Date range validation: end must not be before start (equal is fine)
    if (endDateInput.value < startDateInput.value) {
      setMessage("End date can't be before the start date.", "error");
      return;
    }

    saveBtn.disabled = true;

    const payload = {
      name: nameInput.value.trim(),
      info: infoInput.value.trim() || null,
      start_date: startDateInput.value,
      end_date: endDateInput.value,
      location: locationInput.value.trim(),
      total_tickets: Number(ticketsInput.value)
    };

    if (editingCourseId === null) {
      // CREATE
      const { data: { user } } = await supabaseClient.auth.getUser();
      const { error } = await supabaseClient
        .from("courses")
        .insert({ ...payload, created_by: user.id });

      if (error) {
        setMessage(error.message, "error");
      } else {
        setMessage("Course created.", "success");
        resetFormToCreateMode();
        loadCourses();
      }
    } else {
      // UPDATE -- guard against setting total_tickets below what's
      // already registered (would make tickets_remaining negative)
      const course = coursesData.find(c => c.id === editingCourseId);
      const alreadyTaken = course ? (course.total_tickets - course.tickets_remaining) : 0;

      if (payload.total_tickets < alreadyTaken) {
        setMessage(`Total tickets can't be less than ${alreadyTaken}, since that many are already registered.`, "error");
        saveBtn.disabled = false;
        return;
      }

      const { error } = await supabaseClient
        .from("courses")
        .update(payload)
        .eq("id", editingCourseId);

      if (error) {
        setMessage(error.message, "error");
      } else {
        setMessage("Course updated.", "success");
        resetFormToCreateMode();
        loadCourses();
      }
    }

    saveBtn.disabled = false;
  });

  cancelEditLink.addEventListener("click", (e) => {
    e.preventDefault();
    resetFormToCreateMode();
    setMessage("");
  });

  // Event delegation for all "Cancel" buttons in the registrant lists
  courseListEl.addEventListener("click", async (e) => {
    const cancelBtn = e.target.closest(".cancel-btn");
    const deleteCourseBtn = e.target.closest(".delete-course-btn");
    const editCourseBtn = e.target.closest(".edit-course-btn");
    const approveBtn = e.target.closest(".approve-btn");
    const rejectBtn = e.target.closest(".reject-btn");

    if (editCourseBtn) {
      const id = Number(editCourseBtn.dataset.courseId);
      const course = coursesData.find(c => c.id === id);
      if (!course) return;

      editingCourseId = id;
      nameInput.value = course.name;
      infoInput.value = course.info || "";
      startDateInput.value = course.start_date;
      endDateInput.value = course.end_date;
      locationInput.value = course.location;
      ticketsInput.value = course.total_tickets;

      saveBtn.textContent = "Update course";
      formTitle.textContent = "Edit course";
      cancelEditLink.classList.remove("hidden");
      setMessage("");

      form.scrollIntoView({ behavior: "smooth", block: "start" });
      return;
    }

    if (cancelBtn) {
      const confirmed = window.confirm("Cancel this registration? The tickets will be returned to availability.");
      if (!confirmed) return;

      cancelBtn.disabled = true;
      const { error } = await supabaseClient
        .from("registrations")
        .delete()
        .eq("id", Number(cancelBtn.dataset.regId));

      if (error) {
        alert("Failed to cancel: " + error.message);
        cancelBtn.disabled = false;
      } else {
        loadCourses();
      }
      return;
    }

    if (deleteCourseBtn) {
      const confirmed = window.confirm("Delete this course entirely? This also removes all its registrations. This can't be undone.");
      if (!confirmed) return;

      deleteCourseBtn.disabled = true;
      const { error } = await supabaseClient
        .from("courses")
        .delete()
        .eq("id", Number(deleteCourseBtn.dataset.courseId));

      if (error) {
        alert("Failed to delete course: " + error.message);
        deleteCourseBtn.disabled = false;
      } else {
        if (editingCourseId === Number(deleteCourseBtn.dataset.courseId)) {
          resetFormToCreateMode();
        }
        loadCourses();
      }
      return;
    }

    if (approveBtn) {
      const confirmed = window.confirm("Approve this cancellation? The user's registration will be removed and tickets returned.");
      if (!confirmed) return;

      approveBtn.disabled = true;
      const { data: { user } } = await supabaseClient.auth.getUser();
      const requestId = Number(approveBtn.dataset.requestId);
      const regId = Number(approveBtn.dataset.regId);

      // 1. Mark the request as approved
      const { error: updateError } = await supabaseClient
        .from("cancellation_requests")
        .update({ status: "approved", resolved_at: new Date().toISOString(), resolved_by: user.id })
        .eq("id", requestId);

      if (updateError) {
        alert("Failed to update request: " + updateError.message);
        approveBtn.disabled = false;
        return;
      }

      // 2. Actually cancel the registration (frees up tickets)
      const { error: deleteError } = await supabaseClient
        .from("registrations")
        .delete()
        .eq("id", regId);

      if (deleteError) {
        alert("Request approved, but failed to remove the registration: " + deleteError.message);
      }
      loadCourses();
      return;
    }

    if (rejectBtn) {
      const confirmed = window.confirm("Reject this cancellation request? The user's registration will remain as-is.");
      if (!confirmed) return;

      rejectBtn.disabled = true;
      const { data: { user } } = await supabaseClient.auth.getUser();
      const requestId = Number(rejectBtn.dataset.requestId);

      const { error } = await supabaseClient
        .from("cancellation_requests")
        .update({ status: "rejected", resolved_at: new Date().toISOString(), resolved_by: user.id })
        .eq("id", requestId);

      if (error) {
        alert("Failed to reject request: " + error.message);
        rejectBtn.disabled = false;
      } else {
        loadCourses();
      }
      return;
    }
  });

  guardAndLoad();

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "admin-login.html";
  });
</script>

</body>
</html>
