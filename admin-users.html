<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Users</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #e0995b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
  }

  nav { display: flex; gap: 8px; }

  nav a {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
  }

  nav a.active { color: var(--text); border-color: var(--accent); }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  #loading {
    max-width: 720px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  h1 { font-size: 1.3rem; margin: 0 0 6px; }

  p.subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 24px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  th, td {
    text-align: left;
    padding: 12px 16px;
    font-size: 0.88rem;
    border-bottom: 1px solid var(--border);
  }

  th {
    color: var(--muted);
    font-weight: 600;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: rgba(255,255,255,0.02);
  }

  tr:last-child td { border-bottom: none; }

  .empty-msg {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 20px;
    text-align: center;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="loading">Checking access…</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">Your App <span class="badge">Admin</span></div>
    <nav>
      <a href="admin.html">Announcement</a>
      <a href="admin-courses.html">Courses</a>
      <a href="admin-users.html" class="active">Users</a>
    </nav>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <main>
    <h1>Registered users</h1>
    <p class="subtitle">All users who have signed up on this website.</p>

    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Registered</th>
          <th>Last sign in</th>
        </tr>
      </thead>
      <tbody id="user-table-body">
        <tr><td colspan="3" class="empty-msg">Loading…</td></tr>
      </tbody>
    </table>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const tableBody = document.getElementById("user-table-body");
  const logoutBtn = document.getElementById("logout-btn");

  function formatDateTime(isoString) {
    if (!isoString) return "—";
    const d = new Date(isoString);
    return d.toLocaleString(undefined, {
      year: "numeric", month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  async function guardAndLoad() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "admin-login.html";
      return;
    }

    if (session.user.app_metadata?.role !== "admin") {
      await supabaseClient.auth.signOut();
      window.location.href = "admin-login.html";
      return;
    }

    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");

    loadUsers();
  }

  // Calls the admin_list_users() Postgres function (SECURITY DEFINER,
  // checks admin role internally) -- this is how we can list auth.users
  // safely without exposing that protected schema to regular queries.
  async function loadUsers() {
    const { data, error } = await supabaseClient.rpc("admin_list_users");

    if (error) {
      tableBody.innerHTML = `<tr><td colspan="3" class="empty-msg">Failed to load users: ${escapeHtml(error.message)}</td></tr>`;
      return;
    }

    if (!data || data.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="3" class="empty-msg">No registered users yet.</td></tr>';
      return;
    }

    tableBody.innerHTML = data.map(u => `
      <tr>
        <td>${escapeHtml(u.email)}</td>
        <td>${formatDateTime(u.created_at)}</td>
        <td>${formatDateTime(u.last_sign_in_at)}</td>
      </tr>
    `).join("");
  }

  guardAndLoad();

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "admin-login.html";
  });
</script>

</body>
</html>
