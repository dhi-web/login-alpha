<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #e0995b;
    --accent-hover: #cf8a4e;
    --error: #ef5b5b;
    --success: #4fbf7f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
  }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  #loading {
    max-width: 560px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 6px;
  }

  p.subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 24px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    background: #0f1218;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }

  button.save {
    margin-top: 16px;
    padding: 11px 22px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  button.save:hover { background: var(--accent-hover); }
  button.save:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 14px;
    font-size: 0.85rem;
    min-height: 1.2em;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--success); }

  .hidden { display: none; }
</style>
</head>
<body>

<div id="loading">Checking access…</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">Your App <span class="badge">Admin</span></div>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <main>
    <div class="card">
      <h1>Announcement</h1>
      <p class="subtitle">This message will be shown to all registered users on their dashboard.</p>

      <label for="announcement-text">Announcement text</label>
      <textarea id="announcement-text" placeholder="e.g. Scheduled maintenance on Friday, 10pm–12am."></textarea>

      <br>
      <button class="save" id="save-btn">Save announcement</button>
      <p class="message" id="message"></p>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const textarea = document.getElementById("announcement-text");
  const saveBtn = document.getElementById("save-btn");
  const messageEl = document.getElementById("message");
  const logoutBtn = document.getElementById("logout-btn");

  function setMessage(text, type) {
    messageEl.textContent = text || "";
    messageEl.className = "message" + (type ? " " + type : "");
  }

  // Guard: must be logged in AND have role = admin (app_metadata),
  // otherwise redirect away. app_metadata can only be set via the
  // SQL editor / service role, so a normal user can never fake this.
  async function guardAndLoad() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "admin-login.html";
      return;
    }

    if (session.user.app_metadata?.role !== "admin") {
      await supabaseClient.auth.signOut();
      window.location.href = "admin-login.html";
      return;
    }

    // Load the current announcement text to prefill the form
    const { data, error } = await supabaseClient
      .from("announcements")
      .select("message")
      .eq("id", 1)
      .single();

    if (!error && data) {
      textarea.value = data.message || "";
    }

    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");
  }

  guardAndLoad();

  saveBtn.addEventListener("click", async () => {
    saveBtn.disabled = true;
    setMessage("");

    const { data: { user } } = await supabaseClient.auth.getUser();

    const { error } = await supabaseClient
      .from("announcements")
      .upsert({
        id: 1,
        message: textarea.value.trim(),
        updated_at: new Date().toISOString(),
        updated_by: user.id
      });

    if (error) {
      setMessage(error.message, "error");
    } else {
      setMessage("Announcement saved.", "success");
    }
    saveBtn.disabled = false;
  });

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "admin-login.html";
  });
</script>

</body>
</html>
