<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #e0995b;
    --accent-hover: #cf8a4e;
    --error: #ef5b5b;
    --success: #4fbf7f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
  }

  nav {
    display: flex;
    gap: 8px;
  }

  nav a {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85rem;
  }

  nav a.active {
    color: var(--text);
    border-color: var(--accent);
  }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  #loading {
    max-width: 560px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }

  h1 {
    font-size: 1.3rem;
    margin: 0 0 6px;
  }

  p.subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 24px;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    background: #0f1218;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }

  button.save {
    margin-top: 16px;
    padding: 11px 22px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }

  button.save:hover { background: var(--accent-hover); }
  button.save:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 14px;
    font-size: 0.85rem;
    min-height: 1.2em;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--success); }

  .hidden { display: none; }

  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    margin-top: 24px;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  .history-item:last-child { border-bottom: none; }

  .history-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .history-text {
    font-size: 0.9rem;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  .history-empty {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .history-content {
    flex: 1;
    min-width: 0;
  }

  .history-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .history-actions button {
    padding: 5px 10px;
    font-size: 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
  }

  .history-actions button:hover { border-color: var(--muted); }

  .history-actions button.set-current {
    color: var(--accent);
    border-color: var(--accent);
  }

  .history-actions button.delete-row {
    color: var(--error);
    border-color: var(--error);
  }
</style>
</head>
<body>

<div id="loading">Checking access…</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">Your App <span class="badge">Admin</span></div>
    <nav>
      <a href="admin.html" class="active">Announcement</a>
      <a href="admin-courses.html">Courses</a>
      <a href="admin-users.html">Users</a>
    </nav>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <main>
    <div class="card">
      <h1>Announcement</h1>
      <p class="subtitle">This message will be shown to all registered users on their dashboard.</p>

      <label for="announcement-text">Announcement text</label>
      <textarea id="announcement-text" placeholder="e.g. Scheduled maintenance on Friday, 10pm–12am."></textarea>

      <br>
      <button class="save" id="save-btn">Save announcement</button>
      <p class="message" id="message"></p>
    </div>

    <div class="history-card">
      <h1>History</h1>
      <p class="subtitle">Past announcements, most recent first.</p>
      <div id="history-list">
        <p class="history-empty">Loading…</p>
      </div>
    </div>
  </main>
</div>

<script>
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const textarea = document.getElementById("announcement-text");
  const saveBtn = document.getElementById("save-btn");
  const messageEl = document.getElementById("message");
  const logoutBtn = document.getElementById("logout-btn");
  const historyListEl = document.getElementById("history-list");

  function setMessage(text, type) {
    messageEl.textContent = text || "";
    messageEl.className = "message" + (type ? " " + type : "");
  }

  let currentHistoryId = null; // tracks which history row (if any) is currently live

  // Loads the current announcement + which history row it's linked to.
  // Reused on initial load and after any delete, in case the deleted
  // row was the one currently live (the DB trigger clears it server-side,
  // this just re-syncs the UI to reflect that).
  async function loadCurrentAnnouncement() {
    const { data, error } = await supabaseClient
      .from("announcements")
      .select("message, history_id")
      .eq("id", 1)
      .single();

    if (!error && data) {
      textarea.value = data.message || "";
      currentHistoryId = data.history_id;
    }
  }

  async function guardAndLoad() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "admin-login.html";
      return;
    }

    if (session.user.app_metadata?.role !== "admin") {
      await supabaseClient.auth.signOut();
      window.location.href = "admin-login.html";
      return;
    }

    await loadCurrentAnnouncement();

    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");

    loadHistory();
  }

  function formatDateTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleString(undefined, {
      year: "numeric", month: "short", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  let historyData = []; // keeps the last loaded rows so button clicks can look up the message text

  async function loadHistory() {
    const { data, error } = await supabaseClient
      .from("announcement_history")
      .select("id, message, created_at, created_by_email")
      .order("created_at", { ascending: false })
      .limit(50);

    if (error) {
      historyListEl.innerHTML = '<p class="history-empty">Failed to load history.</p>';
      return;
    }

    historyData = data || [];

    if (historyData.length === 0) {
      historyListEl.innerHTML = '<p class="history-empty">No history yet.</p>';
      return;
    }

    historyListEl.innerHTML = historyData.map(item => `
      <div class="history-item">
        <div class="history-content">
          <div class="history-meta">
            ${formatDateTime(item.created_at)} — ${item.created_by_email || "unknown"}
            ${item.id === currentHistoryId ? '<span style="color: var(--accent); font-weight: 600;"> · Live</span>' : ""}
          </div>
          <div class="history-text">${escapeHtml(item.message)}</div>
        </div>
        <div class="history-actions">
          <button class="set-current" data-id="${item.id}">Set as current</button>
          <button class="delete-row" data-id="${item.id}">Delete</button>
        </div>
      </div>
    `).join("");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // Event delegation: history-list is rebuilt on every load, so we
  // attach one listener to the container instead of per-button.
  historyListEl.addEventListener("click", async (e) => {
    const setBtn = e.target.closest(".set-current");
    const delBtn = e.target.closest(".delete-row");

    if (setBtn) {
      const id = Number(setBtn.dataset.id);
      const row = historyData.find(h => h.id === id);
      if (!row) return;

      setBtn.disabled = true;
      const { data: { user } } = await supabaseClient.auth.getUser();

      const { error } = await supabaseClient
        .from("announcements")
        .upsert({
          id: 1,
          message: row.message,
          history_id: row.id,
          updated_at: new Date().toISOString(),
          updated_by: user.id
        });

      if (error) {
        setMessage("Failed to set as current: " + error.message, "error");
      } else {
        textarea.value = row.message; // reflect it in the form too
        currentHistoryId = row.id;
        setMessage("This announcement is now live for users.", "success");
        loadHistory(); // re-render so the "Live" badge moves to this row
      }
      setBtn.disabled = false;
    }

    if (delBtn) {
      const id = Number(delBtn.dataset.id);
      const confirmed = window.confirm("Delete this history entry? This can't be undone.");
      if (!confirmed) return;

      delBtn.disabled = true;
      const { error } = await supabaseClient
        .from("announcement_history")
        .delete()
        .eq("id", id);

      if (error) {
        setMessage("Failed to delete: " + error.message, "error");
        delBtn.disabled = false;
      } else {
        // If the deleted row was the live one, the DB trigger already
        // cleared announcements.message + history_id server-side.
        // Re-fetch so the textarea and "Live" badge reflect that.
        if (id === currentHistoryId) {
          await loadCurrentAnnouncement();
          setMessage("That was the live announcement -- it's now cleared for users.", "success");
        }
        loadHistory();
      }
    }
  });

  guardAndLoad();

  saveBtn.addEventListener("click", async () => {
    saveBtn.disabled = true;
    setMessage("");

    const { data: { user } } = await supabaseClient.auth.getUser();
    const messageText = textarea.value.trim();

    // 1. Log this save into the history table FIRST (so we get its id)
    const { data: historyRow, error: historyError } = await supabaseClient
      .from("announcement_history")
      .insert({
        message: messageText,
        created_by: user.id,
        created_by_email: user.email
      })
      .select()
      .single();

    if (historyError) {
      setMessage(historyError.message, "error");
      saveBtn.disabled = false;
      return;
    }

    // 2. Point the "current" announcement at this history row
    const { error: upsertError } = await supabaseClient
      .from("announcements")
      .upsert({
        id: 1,
        message: messageText,
        history_id: historyRow.id,
        updated_at: new Date().toISOString(),
        updated_by: user.id
      });

    if (upsertError) {
      setMessage("Logged to history, but failed to set as current: " + upsertError.message, "error");
    } else {
      currentHistoryId = historyRow.id;
      setMessage("Announcement saved.", "success");
      loadHistory();
    }

    saveBtn.disabled = false;
  });

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "admin-login.html";
  });
</script>

</body>
</html>
