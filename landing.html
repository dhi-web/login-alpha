<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #5b8def;
    --accent-hover: #4a7bdb;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px;
  }

  .welcome-card {
    text-align: center;
  }

  #loading {
    max-width: 640px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  .welcome-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px;
  }

  h1 {
    font-size: 1.6rem;
    margin: 0 0 8px;
  }

  .email {
    color: var(--accent);
    font-weight: 600;
  }

  p.subtitle {
    color: var(--muted);
    margin: 0 0 0;
    font-size: 0.95rem;
  }

  .hidden { display: none; }

  .announcement {
    max-width: 640px;
    margin: 24px auto 0;
    background: rgba(224, 153, 91, 0.12);
    border: 1px solid #e0995b;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .announcement .icon {
    flex-shrink: 0;
  }

  .announcement .text {
    white-space: pre-wrap;
  }

  .section-title {
    font-size: 1.2rem;
    margin: 40px 0 16px;
    text-align: left;
  }

  .course-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .course-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    text-align: left;
  }

  .course-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .course-name {
    font-weight: 600;
    font-size: 1.05rem;
  }

  .course-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
    line-height: 1.6;
  }

  .course-info {
    font-size: 0.9rem;
    margin-top: 8px;
    line-height: 1.5;
  }

  .tickets-pill {
    flex-shrink: 0;
    background: rgba(91, 141, 239, 0.12);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .tickets-pill.sold-out {
    background: rgba(239, 91, 91, 0.12);
    border-color: #ef5b5b;
    color: #ef5b5b;
  }

  .register-row {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .register-row input {
    width: 70px;
    padding: 8px 10px;
    background: #0f1218;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
  }

  .register-row label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .register-row button {
    padding: 8px 16px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }

  .register-row button:hover { background: var(--accent-hover); }
  .register-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  .register-msg {
    width: 100%;
    font-size: 0.8rem;
    margin-top: 4px;
  }

  .register-msg.error { color: #ef5b5b; }
  .register-msg.success { color: #4fbf7f; }

  .no-courses {
    color: var(--muted);
    font-size: 0.9rem;
    text-align: left;
  }

  .my-reg-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .my-reg-name {
    font-weight: 600;
    font-size: 1rem;
  }

  .my-reg-meta {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 4px;
    line-height: 1.6;
  }

  .my-reg-tickets-pill {
    flex-shrink: 0;
    background: rgba(79, 191, 127, 0.12);
    border: 1px solid #4fbf7f;
    color: #4fbf7f;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- Shown briefly while we verify the session -->
<div id="loading">Checking your session…</div>

<!-- Real page content, hidden until we confirm the user is signed in -->
<div id="app" class="hidden">
  <header>
    <div class="brand">Your App</div>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <!-- Announcement banner, shown only if admin has set a message -->
  <div class="announcement hidden" id="announcement">
    <span class="icon">📢</span>
    <span class="text" id="announcement-text"></span>
  </div>

  <main>
    <div class="welcome-card">
      <h1>You're signed in 🎉</h1>
      <p class="subtitle">Logged in as <span class="email" id="user-email"></span></p>
    </div>

    <h2 class="section-title">Available courses</h2>
    <div id="course-list" class="course-list">
      <p class="no-courses">Loading…</p>
    </div>

    <h2 class="section-title">My registrations</h2>
    <div id="my-registrations" class="course-list">
      <p class="no-courses">Loading…</p>
    </div>
  </main>
</div>

<script>
  // Use the same project credentials as login.html
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const userEmailEl = document.getElementById("user-email");
  const logoutBtn = document.getElementById("logout-btn");
  const announcementEl = document.getElementById("announcement");
  const announcementTextEl = document.getElementById("announcement-text");
  const courseListEl = document.getElementById("course-list");
  const myRegistrationsEl = document.getElementById("my-registrations");

  let currentUser = null;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str || "";
    return div.innerHTML;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  // Fetch all courses (with live tickets_remaining) and render cards
  // with a register control on each.
  async function loadCourses() {
    const { data: courses, error } = await supabaseClient
      .from("course_availability")
      .select("*")
      .order("course_date", { ascending: true });

    if (error) {
      courseListEl.innerHTML = `<p class="no-courses">Failed to load courses.</p>`;
      return;
    }

    if (!courses || courses.length === 0) {
      courseListEl.innerHTML = '<p class="no-courses">No courses available right now.</p>';
      return;
    }

    courseListEl.innerHTML = courses.map(course => {
      const soldOut = course.tickets_remaining <= 0;
      const maxSelectable = Math.min(8, course.tickets_remaining);

      return `
        <div class="course-item">
          <div class="course-header">
            <div>
              <div class="course-name">${escapeHtml(course.name)}</div>
              <div class="course-meta">${formatDate(course.course_date)} &middot; ${escapeHtml(course.location)}</div>
              ${course.info ? `<div class="course-info">${escapeHtml(course.info)}</div>` : ""}
            </div>
            <div class="tickets-pill ${soldOut ? "sold-out" : ""}">
              ${soldOut ? "Sold out" : `${course.tickets_remaining} / ${course.total_tickets} left`}
            </div>
          </div>
          ${soldOut ? "" : `
            <div class="register-row" data-course-id="${course.id}">
              <label for="tickets-${course.id}">Tickets:</label>
              <input type="number" id="tickets-${course.id}" min="1" max="${maxSelectable}" value="1">
              <button class="register-btn" data-course-id="${course.id}">Register</button>
              <span class="register-msg"></span>
            </div>
          `}
        </div>
      `;
    }).join("");
  }

  // Fetch ONLY the current user's own registrations (RLS on the
  // registrations table already restricts rows to user_id = auth.uid(),
  // so this can never return another user's registration data).
  async function loadMyRegistrations() {
    const { data, error } = await supabaseClient
      .from("registrations")
      .select("id, tickets_count, created_at, courses(name, info, course_date, location)")
      .eq("user_id", currentUser.id)
      .order("created_at", { ascending: false });

    if (error) {
      myRegistrationsEl.innerHTML = '<p class="no-courses">Failed to load your registrations.</p>';
      return;
    }

    if (!data || data.length === 0) {
      myRegistrationsEl.innerHTML = '<p class="no-courses">You haven\'t registered for any course yet.</p>';
      return;
    }

    myRegistrationsEl.innerHTML = data.map(reg => {
      const course = reg.courses;
      if (!course) return ""; // course may have been deleted
      return `
        <div class="my-reg-item">
          <div>
            <div class="my-reg-name">${escapeHtml(course.name)}</div>
            <div class="my-reg-meta">${formatDate(course.course_date)} &middot; ${escapeHtml(course.location)}</div>
          </div>
          <div class="my-reg-tickets-pill">${reg.tickets_count} ticket${reg.tickets_count > 1 ? "s" : ""}</div>
        </div>
      `;
    }).join("");
  }

  // Event delegation for all "Register" buttons
  courseListEl.addEventListener("click", async (e) => {
    const btn = e.target.closest(".register-btn");
    if (!btn) return;

    const courseId = Number(btn.dataset.courseId);
    const row = btn.closest(".register-row");
    const input = row.querySelector("input");
    const msgEl = row.querySelector(".register-msg");
    const ticketsCount = Number(input.value);

    msgEl.textContent = "";
    msgEl.className = "register-msg";

    if (!ticketsCount || ticketsCount < 1 || ticketsCount > 8) {
      msgEl.textContent = "Choose between 1 and 8 tickets.";
      msgEl.className = "register-msg error";
      return;
    }

    btn.disabled = true;

    const { error } = await supabaseClient
      .from("registrations")
      .insert({
        course_id: courseId,
        user_id: currentUser.id,
        user_email: currentUser.email,
        tickets_count: ticketsCount
      });

    if (error) {
      msgEl.textContent = error.message.includes("Not enough tickets")
        ? "Not enough tickets remaining."
        : "Registration failed: " + error.message;
      msgEl.className = "register-msg error";
      btn.disabled = false;
    } else {
      msgEl.textContent = "Registered successfully!";
      msgEl.className = "register-msg success";
      loadCourses(); // refresh remaining ticket counts for everyone viewing
      loadMyRegistrations(); // reflect the new registration immediately
    }
  });

  // Fetch the current announcement (set by admin) and show it if present
  async function loadAnnouncement() {
    const { data, error } = await supabaseClient
      .from("announcements")
      .select("message")
      .eq("id", 1)
      .single();

    if (!error && data && data.message && data.message.trim() !== "") {
      announcementTextEl.textContent = data.message;
      announcementEl.classList.remove("hidden");
    }
  }

  // This page is "protected" -- if there's no active session, bounce
  // back to the login page instead of showing any content.
  async function guardAndRender() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "login.html";
      return;
    }

    currentUser = session.user;
    userEmailEl.textContent = session.user.email;
    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");

    loadAnnouncement();
    loadCourses();
    loadMyRegistrations();
  }

  guardAndRender();

  // If the session ends elsewhere (e.g. expires, or logout in another tab),
  // send the user back to login.
  supabaseClient.auth.onAuthStateChange((_event, session) => {
    if (!session) {
      window.location.href = "login.html";
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  });
</script>

</body>
</html>
