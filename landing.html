<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #5b8def;
    --accent-hover: #4a7bdb;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  button.logout {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
  }

  button.logout:hover { border-color: var(--muted); }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 64px 24px;
    text-align: center;
  }

  #loading {
    max-width: 640px;
    margin: 120px auto;
    text-align: center;
    color: var(--muted);
  }

  .welcome-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px;
  }

  h1 {
    font-size: 1.6rem;
    margin: 0 0 8px;
  }

  .email {
    color: var(--accent);
    font-weight: 600;
  }

  p.subtitle {
    color: var(--muted);
    margin: 0 0 0;
    font-size: 0.95rem;
  }

  .hidden { display: none; }

  .announcement {
    max-width: 640px;
    margin: 24px auto 0;
    background: rgba(224, 153, 91, 0.12);
    border: 1px solid #e0995b;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    text-align: left;
    font-size: 0.9rem;
    line-height: 1.5;
  }

  .announcement .icon {
    flex-shrink: 0;
  }

  .announcement .text {
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<!-- Shown briefly while we verify the session -->
<div id="loading">Checking your session…</div>

<!-- Real page content, hidden until we confirm the user is signed in -->
<div id="app" class="hidden">
  <header>
    <div class="brand">Your App</div>
    <button class="logout" id="logout-btn">Log out</button>
  </header>

  <!-- Announcement banner, shown only if admin has set a message -->
  <div class="announcement hidden" id="announcement">
    <span class="icon">📢</span>
    <span class="text" id="announcement-text"></span>
  </div>

  <main>
    <div class="welcome-card">
      <h1>You're signed in 🎉</h1>
      <p class="subtitle">Logged in as <span class="email" id="user-email"></span></p>
    </div>
  </main>
</div>

<script>
  // Use the same project credentials as login.html
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loadingEl = document.getElementById("loading");
  const appEl = document.getElementById("app");
  const userEmailEl = document.getElementById("user-email");
  const logoutBtn = document.getElementById("logout-btn");
  const announcementEl = document.getElementById("announcement");
  const announcementTextEl = document.getElementById("announcement-text");

  // Fetch the current announcement (set by admin) and show it if present
  async function loadAnnouncement() {
    const { data, error } = await supabaseClient
      .from("announcements")
      .select("message")
      .eq("id", 1)
      .single();

    if (!error && data && data.message && data.message.trim() !== "") {
      announcementTextEl.textContent = data.message;
      announcementEl.classList.remove("hidden");
    }
  }

  // This page is "protected" -- if there's no active session, bounce
  // back to the login page instead of showing any content.
  async function guardAndRender() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session || !session.user) {
      window.location.href = "login.html";
      return;
    }

    userEmailEl.textContent = session.user.email;
    loadingEl.classList.add("hidden");
    appEl.classList.remove("hidden");

    loadAnnouncement();
  }

  guardAndRender();

  // If the session ends elsewhere (e.g. expires, or logout in another tab),
  // send the user back to login.
  supabaseClient.auth.onAuthStateChange((_event, session) => {
    if (!session) {
      window.location.href = "login.html";
    }
  });

  logoutBtn.addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "login.html";
  });
</script>

</body>
</html>
