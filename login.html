<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in</title>

<!-- Supabase JS client (loaded from CDN, no build step needed) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #2a2e37;
    --text: #eef0f3;
    --muted: #8a8f9a;
    --accent: #5b8def;
    --accent-hover: #4a7bdb;
    --error: #ef5b5b;
    --success: #4fbf7f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
  }

  h1 {
    font-size: 1.4rem;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 0 24px;
  }

  .tabs {
    display: flex;
    background: #10131a;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--muted);
    user-select: none;
    transition: background 0.15s, color 0.15s;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin: 16px 0 6px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    background: #0f1218;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
  }

  button.submit {
    width: 100%;
    margin-top: 24px;
    padding: 11px 0;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  button.submit:hover { background: var(--accent-hover); }
  button.submit:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    margin-top: 16px;
    font-size: 0.85rem;
    text-align: center;
    min-height: 1.2em;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--success); }

  .signed-in {
    text-align: center;
  }

  .signed-in p { color: var(--muted); font-size: 0.9rem; }
  .signed-in .email { color: var(--text); font-weight: 600; word-break: break-all; }

  button.secondary {
    margin-top: 20px;
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
  }

  button.secondary:hover { border-color: var(--muted); }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">

  <!-- Logged-out view: login/register form -->
  <div id="auth-view">
    <h1 id="form-title">Welcome back</h1>
    <p class="subtitle" id="form-subtitle">Sign in to continue</p>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="setMode('login')">Log in</div>
      <div class="tab" id="tab-register" onclick="setMode('register')">Register</div>
    </div>

    <form id="auth-form">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" placeholder="At least 6 characters" minlength="6">

      <button type="submit" class="submit" id="submit-btn">Log in</button>
    </form>

    <p class="message" id="message"></p>
  </div>

</div>

<script>
  // ------------------------------------------------------------------
  // 1. CONFIGURE THIS: paste your Supabase project's URL and anon key.
  //    Find these in your Supabase dashboard under
  //    Project Settings -> API. The "anon" key is safe to use in
  //    client-side code (it's public by design).
  // ------------------------------------------------------------------
  const SUPABASE_URL = "https://ccwqtvdkoamgrkcvuzlg.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjd3F0dmRrb2FtZ3JrY3Z1emxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxNzYwNzUsImV4cCI6MjA5OTc1MjA3NX0.wzRtoG9UKKNtGGxpytjbfqh3Z14gSJdj7P9HR7LZHt8";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ------------------------------------------------------------------
  // UI state
  // ------------------------------------------------------------------
  let mode = "login"; // "login" | "register"

  const form = document.getElementById("auth-form");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const submitBtn = document.getElementById("submit-btn");
  const messageEl = document.getElementById("message");
  const formTitle = document.getElementById("form-title");
  const formSubtitle = document.getElementById("form-subtitle");
  const tabLogin = document.getElementById("tab-login");
  const tabRegister = document.getElementById("tab-register");

  function setMode(next) {
    mode = next;
    tabLogin.classList.toggle("active", mode === "login");
    tabRegister.classList.toggle("active", mode === "register");
    submitBtn.textContent = mode === "login" ? "Log in" : "Create account";
    formTitle.textContent = mode === "login" ? "Welcome back" : "Create an account";
    formSubtitle.textContent = mode === "login" ? "Sign in to continue" : "It only takes a minute";
    passwordInput.autocomplete = mode === "login" ? "current-password" : "new-password";
    setMessage("");
  }

  function setMessage(text, type) {
    messageEl.textContent = text || "";
    messageEl.className = "message" + (type ? " " + type : "");
  }

  function goToLanding() {
    window.location.href = "landing.html";
  }

  // On load, check if a session already exists (e.g. user already logged in)
  async function checkSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session && session.user) {
      goToLanding();
    }
  }
  checkSession();

  // If we arrived here via a "Sign up" link (e.g. index.html?mode=register
  // redirecting to login.html?mode=register), open directly on the
  // Register tab instead of the default Log in tab.
  const params = new URLSearchParams(window.location.search);
  if (params.get("mode") === "register") {
    setMode("register");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    submitBtn.disabled = true;
    setMessage("");

    try {
      if (mode === "register") {
        // emailRedirectTo tells Supabase where the confirmation link
        // should send the user back to. Using window.location.href
        // (with login.html swapped for landing.html) means this
        // automatically resolves correctly whether you're testing on
        // localhost, XAMPP, or running on GitHub Pages -- no need to
        // hardcode a domain or manually update it per environment.
        const redirectTo = window.location.href.replace(/login\.html.*$/, "landing.html");

        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: redirectTo }
        });
        if (error) throw error;

        // If email confirmation is enabled in your Supabase project
        // (Authentication -> Providers -> Email), there will be no
        // active session yet -- the user must confirm via email first.
        if (data.session) {
          goToLanding();
        } else {
          setMessage("Account created. Check your email to confirm before logging in.", "success");
          setMode("login");
        }
      } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        goToLanding();
      }
    } catch (err) {
      setMessage(err.message || "Something went wrong.", "error");
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
